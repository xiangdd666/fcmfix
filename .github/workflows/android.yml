name: Android CI

# 适配 fork 自建：不依赖任何 secrets，产出 debug 签名 APK（LSPosed 模块 debug 签名即可激活）
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Ensure Android SDK platform 36
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" || true

    - name: Build debug APK
      run: ./gradlew assembleDebug

    - name: Upload built apk
      uses: actions/upload-artifact@v4
      with:
        name: fcmfix-debug
        path: ${{ github.workspace }}/app/build/outputs/apk/debug/*.apk
